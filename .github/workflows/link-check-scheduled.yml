name: Scheduled Link Check

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run scheduled link check
        uses: ./.github/actions/link-check

      - name: Upload link check report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report-scheduled
          path: linkinator-report.md
          if-no-files-found: ignore
