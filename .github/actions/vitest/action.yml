name: Vitest
description: Install dependencies and run Vitest suite.

inputs:
  node_version:
    description: Node.js version for the job.
    required: false
    default: '22'
  pnpm_version:
    description: pnpm version for the job.
    required: false
    default: '9'
  install_command:
    description: Command used to install dependencies.
    required: false
    default: pnpm install --frozen-lockfile
  vitest_command:
    description: Command used to execute Vitest.
    required: false
    default: pnpm run test:run

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm_version }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: ${{ inputs.install_command }}

    - name: Run Vitest
      shell: bash
      run: ${{ inputs.vitest_command }}
